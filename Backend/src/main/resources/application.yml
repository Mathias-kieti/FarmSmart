server:
  port: 4000

spring:
  config:
    import:
      # Load local .env values when running from Backend/ or from the repo root.
      - optional:file:.env[.properties]
      - optional:file:Backend/.env[.properties]
  application:
    name: farmsmart-backend

farmsmart:
  cors:
    allowed-origins: http://localhost:5173
  auth:
    # Default keeps the app runnable before Firebase Admin credentials are added.
    # Set FARMSMART_AUTH_MODE=firebase when the frontend sends Firebase ID tokens.
    mode: ${FARMSMART_AUTH_MODE:off}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:farmsmartv01}
  flowise:
    url: ${FARMSMART_FLOWISE_URL:}
    api-key: ${FARMSMART_FLOWISE_API_KEY:}
